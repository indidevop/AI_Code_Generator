spring:
  application:
    name: AI_Code_Generator

  datasource:
    url: jdbc:postgresql://localhost:5432/AICodeGenerator
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true



